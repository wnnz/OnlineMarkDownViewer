<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MD Viewer</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="lib/bulma/css/bulma.min.css" />
    <link rel="stylesheet" href="lib/highlightjs/styles/github-dark.min.css" />
    <link rel="stylesheet" href="app.css" />
</head>
<body>
    <div id="app">
        <div class="boot-screen">
            <div class="boot-card glass-panel">
                <span class="boot-kicker">MD Viewer</span>
                <h1>正在加载 WebAssembly 应用</h1>
                <p>页面资源已缓存后，文档浏览与阅读体验会立即接手。</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        应用发生异常，请刷新页面后重试。
        <a href="" class="reload">刷新</a>
        <a class="dismiss">关闭</a>
    </div>

    <script src="lib/highlightjs/highlight.min.js"></script>
    <script src="js/app.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
